repos:
  # ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version
    rev: v0.15.1
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix, --unsafe-fixes]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
